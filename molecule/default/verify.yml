---
- name: Verify
  hosts: all
  tasks:
    - name: Linux | clever should be functional
      ansible.builtin.command: clever version
      register: clever_result
      changed_when: false

    - name: Linux | Verify commands outputs
      ansible.builtin.assert:
        that:
          - clever_result.rc == 0
        success_msg: "All tests passed"
